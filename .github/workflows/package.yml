name: Package

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to attach artifacts to (e.g. v0.1.0). Leave empty to only build artifacts."
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: package-${{ github.event.release.tag_name || github.run_id }}
  cancel-in-progress: false

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      tag: ${{ steps.ver.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.ref }}

      - id: ver
        run: |
          if [[ -n "${{ github.event.release.tag_name }}" ]]; then
            TAG="${{ github.event.release.tag_name }}"
          elif [[ -n "${{ inputs.tag }}" ]]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="v$(node -p "require('./package.json').version")"
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  deb-rpm-arch:
    needs: resolve-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build deb, rpm, arch
        run: bash packaging/scripts/build-deb-rpm.sh all
        env:
          PACKAGE_VERSION: ${{ needs.resolve-version.outputs.version }}

      - uses: actions/upload-artifact@v4
        with:
          name: packages-nfpm
          path: dist/packages/*
          retention-days: 7

  appimage:
    needs: resolve-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install AppImage dependencies
        run: sudo apt-get update && sudo apt-get install -y libfuse2 file

      - name: Build AppImage
        run: bash packaging/scripts/build-appimage.sh
        env:
          PACKAGE_VERSION: ${{ needs.resolve-version.outputs.version }}

      - uses: actions/upload-artifact@v4
        with:
          name: packages-appimage
          path: dist/packages/*.AppImage
          retention-days: 7

  source:
    needs: resolve-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build source archives and PKGBUILD
        run: |
          bash packaging/scripts/build-source.sh
          sed "s/__VERSION__/${PACKAGE_VERSION}/g" packaging/arch/PKGBUILD.in > dist/packages/PKGBUILD
        env:
          PACKAGE_VERSION: ${{ needs.resolve-version.outputs.version }}

      - uses: actions/upload-artifact@v4
        with:
          name: packages-source
          path: |
            dist/packages/*.tar.gz
            dist/packages/PKGBUILD
          retention-days: 7

  flatpak:
    needs: resolve-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install flatpak-builder
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder elfutils
          flatpak remote-add --if-not-exists --user flathub https://dl.flathub.org/repo/flathub.flatpakrepo
          flatpak install -y --user flathub \
            org.freedesktop.Platform//24.08 \
            org.freedesktop.Sdk//24.08

      - name: Build Flatpak bundle
        run: bash packaging/scripts/build-flatpak.sh
        env:
          PACKAGE_VERSION: ${{ needs.resolve-version.outputs.version }}

      - uses: actions/upload-artifact@v4
        with:
          name: packages-flatpak
          path: dist/packages/*.flatpak
          retention-days: 7

  snap:
    needs: resolve-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.ref }}

      - name: Place snapcraft.yaml for snapcore/action-build
        run: |
          VERSION="${{ needs.resolve-version.outputs.version }}"
          mkdir -p snap
          sed "s/^version: .*/version: '${VERSION}'/" packaging/snap/snapcraft.yaml > snap/snapcraft.yaml

      - uses: snapcore/action-build@v1
        id: snapcraft
        with:
          snapcraft-args: --verbose

      - name: Collect snap artifact
        run: |
          mkdir -p dist/packages
          VERSION="${{ needs.resolve-version.outputs.version }}"
          SNAP_FILE="${{ steps.snapcraft.outputs.snap }}"
          if [[ -n "$SNAP_FILE" && -f "$SNAP_FILE" ]]; then
            cp "$SNAP_FILE" "dist/packages/cloudflare-one-gui_${VERSION}_amd64.snap"
          else
            shopt -s nullglob
            for snap in *.snap; do
              mv "$snap" "dist/packages/cloudflare-one-gui_${VERSION}_amd64.snap"
            done
          fi
          ls -la dist/packages/

      - uses: actions/upload-artifact@v4
        with:
          name: packages-snap
          path: dist/packages/*.snap
          retention-days: 7

  publish:
    needs: [resolve-version, deb-rpm-arch, appimage, source, flatpak, snap]
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || inputs.tag != ''
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: packages-*
          merge-multiple: true

      - name: Collect and checksum
        run: |
          mkdir -p dist/packages
          find artifacts -type f -exec cp -t dist/packages {} +
          ls -la dist/packages
          bash packaging/scripts/checksums.sh
        env:
          PACKAGE_VERSION: ${{ needs.resolve-version.outputs.version }}

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.resolve-version.outputs.tag }}
        run: |
          gh release upload "$TAG" dist/packages/* --clobber
