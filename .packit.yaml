# Packit — build thirdflare-one RPMs in COPR on release.
# https://packit.dev/docs/configuration/
#
# One-time: enable Packit on the GitHub repo and create COPR project
# oldrepublicwizard/thirdflare-one

upstream_project_url: https://github.com/oldrepublicwizard/thirdflare-one
upstream_package_name: thirdflare-one
downstream_package_name: thirdflare-one
specfile_path: packaging/fedora/thirdflare-one.spec

actions:
  create-archive:
    - bash -c 'export PACKAGE_VERSION=$(node -p "require(\"./package.json\").version"); bash packaging/scripts/build-source.sh; cp dist/packages/thirdflare-one-${PACKAGE_VERSION}-src.tar.gz ./thirdflare-one-${PACKAGE_VERSION}.tar.gz'
  get-current-version:
    - node -p "require('./package.json').version"

jobs:
  copr_build:
    trigger: release
    metadata:
      targets:
        - fedora-all
      owner: oldrepublicwizard
      project: thirdflare-one
