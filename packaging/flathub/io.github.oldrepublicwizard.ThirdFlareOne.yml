# Flathub submission manifest
#
# Copy or symlink this file into a PR against https://github.com/flathub/flathub
# as: io.github.oldrepublicwizard.ThirdFlareOne.yml
#
# Update `tag` and `commit` on each release (or use FLATHUB_PAT automation).

app-id: io.github.oldrepublicwizard.ThirdFlareOne
runtime: org.freedesktop.Platform
runtime-version: "24.08"
sdk: org.freedesktop.Sdk
command: thirdflare-one

finish-args:
  - --share=network
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --filesystem=xdg-run/
  - --filesystem=xdg-cache/
  - --talk-name=org.freedesktop.Flatpak
  - --talk-name=org.freedesktop.Notifications

modules:
  - name: node
    buildsystem: simple
    build-commands:
      - |
        install -d /app/lib/node /app/bin
        tar -xJf node-v20.18.1-linux-x64.tar.xz -C /app/lib/node --strip-components=1
        ln -s /app/lib/node/bin/node /app/bin/node
    sources:
      - type: file
        url: https://nodejs.org/dist/v20.18.1/node-v20.18.1-linux-x64.tar.xz
        sha256: c6fa75c841cbffac851678a472f2a5bd612fff8308ef39236190e1f8dbb0e567
        dest-filename: node-v20.18.1-linux-x64.tar.xz

  - name: thirdflare-one
    buildsystem: simple
    build-commands:
      - |
        install -d /app/lib/thirdflare
        cp -a server.js package.json public assets scripts bin lib config /app/lib/thirdflare/
        cp thirdflare-one /app/lib/thirdflare/ 2>/dev/null || true
        chmod 0755 /app/lib/thirdflare/bin/*
        install -d /app/bin
        cat > /app/bin/thirdflare-one <<'EOF'
        #!/bin/bash
        export PATH="/app/lib/node/bin:/app/bin:${PATH}"
        export THIRDFLARE_NODE="/app/lib/node/bin/node"
        exec /app/lib/thirdflare/bin/thirdflare "$@"
        EOF
        chmod 0755 /app/bin/thirdflare-one
        install -Dm644 packaging/thirdflare-one.desktop \
          /app/share/applications/io.github.oldrepublicwizard.ThirdFlareOne.desktop
        sed -i \
          -e 's|^Exec=.*|Exec=thirdflare-one|' \
          -e 's|^Icon=.*|Icon=io.github.oldrepublicwizard.ThirdFlareOne|' \
          /app/share/applications/io.github.oldrepublicwizard.ThirdFlareOne.desktop
        install -Dm644 assets/thirdflare.svg \
          /app/share/icons/hicolor/scalable/apps/io.github.oldrepublicwizard.ThirdFlareOne.svg
        install -Dm644 packaging/flatpak/metainfo.xml \
          /app/share/metainfo/io.github.oldrepublicwizard.ThirdFlareOne.metainfo.xml
    sources:
      - type: git
        url: https://github.com/oldrepublicwizard/thirdflare-one.git
        tag: v0.2.6
        commit: 14570b1c13b50a52ea3d867b7781c2f0c3da9019
