# yaml-language-server: $schema=https://nfpm.goreleaser.com/static/schema.json
name: thirdflare
arch: all
platform: linux
version: ${VERSION}
section: net
priority: optional
maintainer: ThirdFlare contributors
description: |-
  ThirdFlare — unofficial third-party Cloudflare One client for Linux.
  Drop-in warp-cli GUI parity with the Windows Cloudflare One app.
  Requires Cloudflare WARP (warp-cli) on the host.
vendor: ThirdFlare
homepage: https://github.com/oldrepublicwizard/cloudflare-one-gui-linux
license: MIT
contents:
  - src: ./dist/payload/usr/lib/thirdflare
    dst: /usr/lib/thirdflare
  - src: ./dist/payload/usr/bin/thirdflare
    dst: /usr/bin/thirdflare
    file_info:
      mode: 0755
  - src: ./dist/payload/usr/bin/cloudflare-one-gui
    dst: /usr/bin/cloudflare-one-gui
    file_info:
      mode: 0755
  - src: ./dist/payload/usr/share/applications/thirdflare.desktop
    dst: /usr/share/applications/thirdflare.desktop
  - src: ./dist/payload/usr/share/icons/hicolor/scalable/apps/thirdflare.svg
    dst: /usr/share/icons/hicolor/scalable/apps/thirdflare.svg
  - src: ./dist/payload/usr/lib/systemd/user/thirdflare.service
    dst: /usr/lib/systemd/user/thirdflare.service
  - src: ./dist/payload/usr/lib/systemd/user/cloudflare-one-gui.service
    dst: /usr/lib/systemd/user/cloudflare-one-gui.service
  - src: ./dist/payload/etc/default/thirdflare
    dst: /etc/default/thirdflare
  - src: ./dist/payload/etc/thirdflare/config.json.example
    dst: /etc/thirdflare/config.json.example
  - src: ./dist/payload/usr/share/doc/thirdflare
    dst: /usr/share/doc/thirdflare
  - src: ./dist/payload/usr/share/licenses/thirdflare
    dst: /usr/share/licenses/thirdflare
depends:
  - nodejs
recommends:
  - yad
  - libnotify-bin
overrides:
  deb:
    depends:
      - "nodejs (>= 20)"
  rpm:
    depends:
      - "nodejs >= 20"
    recommends:
      - yad
      - libnotify
  archlinux:
    depends:
      - nodejs
    recommends:
      - yad
      - libnotify
scripts:
  postinstall: ./packaging/scripts/nfpm-postinstall.sh
  postremove: ./packaging/scripts/nfpm-postremove.sh
